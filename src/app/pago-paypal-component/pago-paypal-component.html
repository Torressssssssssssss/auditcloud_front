<div class="paypal-container">
  <div *ngIf="cargando()" class="loading-state">
    <div class="spinner"></div>
    <p>Cargando opciones de pago...</p>
  </div>

  <div #paypalRef class="paypal-button-wrapper"></div>

  <div *ngIf="procesando()" class="processing-overlay">
    <div class="spinner"></div>
    <p>Procesando pago...</p>
  </div>

  <div *ngIf="errorMsg()" class="error-message">
    <app-icon name="alert-circle" [size]="20" class="icon-error"></app-icon>
    {{ errorMsg() }}
  </div>
</div>
