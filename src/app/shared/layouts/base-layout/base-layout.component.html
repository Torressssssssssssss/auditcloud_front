<div class="layout-container page-grad">
  <app-navbar 
    [items]="navItems"
    [usuarioNombre]="usuarioNombre"
    [usuarioRol]="usuarioRol"
    [isOpen]="isMobileMenuOpen"
    (close)="closeMobileMenu()"
    (logout)="onLogout()">
  </app-navbar>
  
  <div class="main-content">
    <header class="header">
      <div class="header-left">
        <button
          type="button"
          class="menu-toggle"
          [attr.aria-expanded]="isMobileMenuOpen"
          aria-label="Abrir menu"
          (click)="toggleMobileMenu()">
          <span></span>
          <span></span>
          <span></span>
        </button>
        <h1 class="page-title">{{ title }}</h1>
      </div>
      <div class="header-actions">
        <app-theme-toggle></app-theme-toggle>
        @if (usuarioRol === 'Cliente') {
          <app-notificaciones></app-notificaciones>
        }
        <div class="user-info">
          <span class="user-greeting">Hola, {{ usuarioNombre }}</span>
          <span class="user-role">{{ usuarioRol }}</span>
        </div>
        <div class="user-avatar" aria-hidden="true">
          {{ usuarioNombre.charAt(0).toUpperCase() }}
        </div>
      </div>
    </header>
    
    <main class="content-area">
      <ng-content></ng-content>
    </main>
  </div>
</div>
