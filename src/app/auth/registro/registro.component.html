<div class="auth-page registro-page">
  <div class="auth-card registro-card">
    <div class="auth-card-header">
      <div>
        <p class="auth-eyebrow">AuditCloud</p>
        <h1>Crear cuenta de cliente</h1>
        <p class="auth-subtitle">Registra tu acceso y los datos básicos de tu empresa.</p>
      </div>
      <button type="button" class="auth-secondary-button" (click)="goLogin()">Volver a login</button>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" class="auth-form form-grid">
      <div class="md:col-span-2 auth-field">
        <label>Nombre del contacto</label>
        <input class="input-xl" type="text" formControlName="nombre" placeholder="Juan Pérez" />
        <p class="auth-field-error text-red-600" *ngIf="form.controls.nombre.touched && form.controls.nombre.invalid">Nombre requerido</p>
      </div>

      <div class="auth-field">
        <label>Correo</label>
        <input class="input-xl" type="email" formControlName="correo" placeholder="cliente@empresa.com" />
        <p class="auth-field-error text-red-600" *ngIf="form.controls.correo.touched && form.controls.correo.invalid">Correo inválido</p>
      </div>

      <div class="auth-field">
        <label>Contraseña</label>
        <input class="input-xl" type="password" formControlName="password" placeholder="••••••" />
        <p class="auth-field-error text-red-600" *ngIf="form.controls.password.touched && form.controls.password.invalid">Mínimo 6 caracteres</p>
      </div>

      <div class="md:col-span-2 auth-field">
        <label>Nombre de empresa</label>
        <input class="input-xl" type="text" formControlName="nombre_empresa" placeholder="Mi Empresa S.A." />
        <p class="auth-field-error text-red-600" *ngIf="form.controls.nombre_empresa.touched && form.controls.nombre_empresa.invalid">Nombre de empresa requerido</p>
      </div>

      <div class="auth-field">
        <label>Ciudad</label>
        <input class="input-xl" type="text" formControlName="ciudad" placeholder="Ciudad" />
      </div>

      <div class="auth-field">
        <label>Estado</label>
        <input class="input-xl" type="text" formControlName="estado" placeholder="Estado" />
      </div>

      <div class="md:col-span-2 auth-field">
        <label>RFC (opcional)</label>
        <input class="input-xl" type="text" formControlName="rfc" placeholder="AAA010101XXX" />
      </div>

      <div class="form-actions">
        <div class="auth-error form-error" *ngIf="error()">{{ error() }}</div>
        <button class="auth-button auth-button-primary btn-grad" type="submit" [disabled]="loading()">{{ loading() ? 'Creando...' : 'Crear cuenta' }}</button>
      </div>
    </form>
  </div>
  <footer class="auth-footer">
    <p>&copy; 2024 AuditCloud. Todos los derechos reservados.</p>
  </footer>
</div>
